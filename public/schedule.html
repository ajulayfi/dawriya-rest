<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>دورية الاستراحة — جدول الشهر</title>

  <link rel="stylesheet" href="./assets/app.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
<div class="container">

  <div class="header">
    <div class="title">
      <h1 id="pageTitle">دورية الاستراحة</h1>
      <div class="sub">الجدول الشهري — إضافة للتقويم أو مشاركة عبر واتساب</div>
    </div>
    <div class="toolbar">
      <a class="btn secondary" href="./login.html">دخول الإدارة</a>
    </div>
  </div>

  <div id="nextBox" class="nextBanner" style="display:none"></div>

  <div class="stickyBar">
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <span class="badge" id="monthBadge">—</span>
      <span class="badge">📍 <b style="color:#111827" id="loc">—</b></span>
    </div>

    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <input id="monthPick" class="input" type="month" style="width:160px"/>
      <button id="reload" class="btn secondary">تحديث</button>
    </div>

    <div class="chips" id="chips">
      <button class="chip active" data-filter="all">الكل</button>
      <button class="chip" data-filter="futoor">فطور</button>
      <button class="chip" data-filter="ghada">غدا</button>
      <button class="chip" data-filter="asha">عشا</button>
      <button class="chip" data-filter="suhoor">سحور</button>
      <button class="chip" data-filter="upcoming">القادمة</button>
    </div>
  </div>

  <div id="msg" class="notice">—</div>

  <div class="card" style="margin-top:12px">
    <div style="font-weight:800">بطاقات الشهر</div>
    <div class="small">اليوم مميز — المنتهية داخل قسم مطوي بالأسفل.</div>
    <div class="hr"></div>

    <div id="list">—</div>
    <div id="pastWrap"></div>
  </div>

</div>

<script type="module">
  import { DEFAULT_LOCATION, APP_TITLE, TZ } from "./assets/config.js";
  import {
    sb,
    pad2,
    getMonthParam,
    monthLabel,
    mealLabel,
    formatTime12,
    formatGregorian,
    formatHijriUmmAlQura,
    isTodayTZ,
    endLabel,
    downloadICS,
    skeletonMealsHTML
  } from "./assets/app.js";

  const $ = (id) => document.getElementById(id);

  $("pageTitle").textContent = APP_TITLE;
  $("loc").textContent = DEFAULT_LOCATION;

  let activeFilter = "all";
  let cachedRows = [];
  let nextMeal = null;
  let countdownTimer = null;

  function setMessage(kind, text){
    $("msg").className = kind ? ("notice " + kind) : "notice";
    $("msg").textContent = text;
  }

  function setFilter(f){
    activeFilter = f;
    document.querySelectorAll(".chip").forEach(btn => btn.classList.toggle("active", btn.dataset.filter === f));
    renderAll();
  }

  $("chips").addEventListener("click", (e) => {
    const btn = e.target.closest(".chip");
    if (!btn) return;
    setFilter(btn.dataset.filter);
  });

  $("reload").addEventListener("click", () => loadMonth($("monthPick").value));
  $("monthPick").addEventListener("change", () => loadMonth($("monthPick").value));

  function formatCountdown(ms){
    if (ms <= 0) return "بدأت الآن";
    const s = Math.floor(ms/1000);
    const days = Math.floor(s/86400);
    const hrs  = Math.floor((s%86400)/3600);
    const mins = Math.floor((s%3600)/60);
    if (days > 0) return "باقي " + days + " يوم و " + hrs + " ساعة";
    if (hrs > 0)  return "باقي " + hrs + " ساعة و " + mins + " دقيقة";
    return "باقي " + mins + " دقيقة";
  }

  function pickNextUpcoming(rows){
    const now = new Date();
    const upcoming = rows
      .filter(r => new Date(r.starts_at) >= now)
      .sort((a,b)=> new Date(a.starts_at) - new Date(b.starts_at));
    return upcoming.length ? upcoming[0] : null;
  }

  function showNextBanner(r){
    const box = $("nextBox");
    if (!r){
      box.style.display = "none";
      return;
    }

    const g = formatGregorian(r.starts_at);
    const h = formatHijriUmmAlQura(r.starts_at);
    const t = formatTime12(r.starts_at) + " – " + formatTime12(r.ends_at) + endLabel(r.ends_at, r.starts_at);

    box.style.display = "block";
    box.innerHTML = `
      <div>⏭️ <b>أقرب مناسبة:</b> ${mealLabel(r.meal)}</div>
      <div class="small">📅 ${g}</div>
      <div class="small">🕌 ${h}</div>
      <div class="small">⏰ ${t}</div>
      <div style="margin-top:6px"><b id="countDown">⏳ ...</b></div>
    `;
  }

  function runCountdown(){
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = null;
    if (!nextMeal) return;

    const tick = () => {
      const el = document.getElementById("countDown");
      if (!el) return;
      const ms = new Date(nextMeal.starts_at) - new Date();
      el.textContent = "⏳ " + formatCountdown(ms);
    };

    tick();
    countdownTimer = setInterval(tick, 30000);
  }

  function openWhatsAppShare(text){
    window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank");
  }

  function buildCard(r, { variant }){
    const now = new Date();
    const isPast = new Date(r.starts_at) < now;
    const isToday = isTodayTZ(r.starts_at);
    const isNext = nextMeal && r.id === nextMeal.id;

    const hosts = (r._hostNames && r._hostNames.length) ? r._hostNames.join(" – ") : "—";
    const g = formatGregorian(r.starts_at);
    const h = formatHijriUmmAlQura(r.starts_at);
    const t = formatTime12(r.starts_at) + " – " + formatTime12(r.ends_at) + endLabel(r.ends_at, r.starts_at);

    const card = document.createElement("div");
    card.className = "card mealCard";
    card.dataset.meal = r.meal;

    if (variant === "past" || isPast){
      card.classList.add("pastCard");
    }

    if (variant !== "past"){
      if (isToday){
        card.style.border = "1px solid rgba(245,158,11,.55)";
        card.style.background = "rgba(245,158,11,.06)";
      } else if (isNext){
        card.style.border = "1px solid rgba(34,197,94,.55)";
        card.style.background = "rgba(34,197,94,.06)";
      }
    }

    const tagText = (variant !== "past") ? (isToday ? "📍 اليوم" : (isNext ? "⏭️ الأقرب" : "")) : "";

    const top = document.createElement("div");
    top.className = "mealTop";

    const left = document.createElement("div");
    left.innerHTML = `
      <div class="mealName">🍽️ ${mealLabel(r.meal)}</div>
      <div class="mealMeta">
        <div><b style="color:#0f172a">📅 ${g}</b></div>
        <div>🕌 ${h}</div>
        <div>⏰ ${t}</div>
      </div>
    `;

    if (tagText){
      const pill = document.createElement("span");
      pill.className = "pill";
      pill.style.marginTop = "10px";
      pill.textContent = tagText;
      left.appendChild(pill);
    }

    const actions = document.createElement("div");
    actions.className = "actionsCol";

    const btnIcs = document.createElement("button");
    btnIcs.className = "btn secondary";
    btnIcs.textContent = "📅 أضف للتقويم";
    btnIcs.onclick = () => {
      downloadICS({
        meal: r.meal,
        startsAtISO: r.starts_at,
        endsAtISO: r.ends_at,
        hostsText: hosts,
        notes: r.notes
      });
    };

    const btnWa = document.createElement("button");
    btnWa.className = "btn";
    btnWa.style.background = "#25D366";
    btnWa.textContent = "📤 مشاركة واتساب";
    btnWa.onclick = () => {
      const msg = [
        "🍽️ " + mealLabel(r.meal),
        "📅 " + g,
        "🕌 " + h,
        "⏰ " + t,
        "📍 " + DEFAULT_LOCATION,
        "👥 الداعين: " + hosts
      ];
      if (r.notes) msg.push("📝 " + r.notes);
      msg.push("");
      msg.push(location.href);
      openWhatsAppShare(msg.join("\n"));
    };

    actions.appendChild(btnIcs);
    actions.appendChild(btnWa);

    top.appendChild(left);
    top.appendChild(actions);

    const hostsBlock = document.createElement("div");
    hostsBlock.className = "hostsBlock";
    hostsBlock.innerHTML = `
      <div class="hostsTitle">الداعين</div>
      <div class="hostsNames">${hosts}</div>
    `;

    if (r.notes){
      const note = document.createElement("div");
      note.className = "small";
      note.style.marginTop = "8px";
      note.textContent = "ملاحظة: " + r.notes;
      hostsBlock.appendChild(note);
    }

    card.appendChild(top);
    card.appendChild(hostsBlock);
    return card;
  }

  function renderAll(){
    const now = new Date();
    let base = cachedRows.slice();

    if (activeFilter === "upcoming") base = base.filter(r => new Date(r.starts_at) >= now);
    else if (activeFilter !== "all") base = base.filter(r => r.meal === activeFilter);

    const currentRows = base.filter(r => new Date(r.starts_at) >= now);
    const pastRowsAll = cachedRows.filter(r => new Date(r.starts_at) < now);

    currentRows.sort((a,b)=>{
      const aToday = isTodayTZ(a.starts_at) ? 0 : 1;
      const bToday = isTodayTZ(b.starts_at) ? 0 : 1;
      if (aToday !== bToday) return aToday - bToday;
      return new Date(a.starts_at) - new Date(b.starts_at);
    });

    pastRowsAll.sort((a,b)=> new Date(b.starts_at) - new Date(a.starts_at));

    const wrap = document.createElement("div");
    wrap.className = "cardsGrid";

    if (!currentRows.length){
      wrap.innerHTML = '<div class="notice">لا توجد مناسبات قادمة ضمن هذا الفلتر.</div>';
    } else {
      currentRows.forEach(r => wrap.appendChild(buildCard(r, { variant: "normal" })));
    }

    $("list").innerHTML = "";
    $("list").appendChild(wrap);

    const pastWrap = $("pastWrap");
    pastWrap.innerHTML = "";

    if (pastRowsAll.length){
      const details = document.createElement("details");
      details.className = "pastDetails";
      details.open = false;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>المنتهية (${pastRowsAll.length})</div>
        <div class="summaryHint">اضغط للعرض</div>
      `;

      const inner = document.createElement("div");
      inner.style.marginTop = "12px";

      const grid = document.createElement("div");
      grid.className = "cardsGrid";
      pastRowsAll.forEach(r => grid.appendChild(buildCard(r, { variant: "past" })));

      inner.appendChild(grid);
      details.appendChild(summary);
      details.appendChild(inner);
      pastWrap.appendChild(details);
    }
  }

  async function loadMonth(m){
    $("monthPick").value = m;
    $("monthBadge").textContent = monthLabel(m);

    setMessage("", " "); // keep space (better UX)
    $("list").innerHTML = skeletonMealsHTML(3);
    $("pastWrap").innerHTML = "";

    const start = m + "-01T00:00:00+03:00";
    const [yy, mm] = m.split("-").map(Number);
    const endDate = new Date(Date.UTC(yy, mm, 1));
    const end = endDate.getUTCFullYear() + "-" + pad2(endDate.getUTCMonth()+1) + "-" + pad2(endDate.getUTCDate()) + "T00:00:00+03:00";

    const resMeals = await sb
      .from("meals")
      .select(`
        id, meal, starts_at, ends_at, notes,
        meal_hosts (
          member_id,
          members ( full_name )
        )
      `)
      .gte("starts_at", start)
      .lt("starts_at", end)
      .order("starts_at", { ascending:true });

    if (resMeals.error){
      setMessage("warn", "تعذر تحميل البيانات: " + resMeals.error.message);
      $("nextBox").style.display = "none";
      cachedRows = [];
      nextMeal = null;
      if (countdownTimer) clearInterval(countdownTimer);
      $("list").innerHTML = "";
      return;
    }

    const rows = resMeals.data || [];
    if (!rows.length){
      setMessage("", "لا توجد بيانات لهذا الشهر حتى الآن.");
      $("list").innerHTML = '<div class="notice">لا توجد مناسبات.</div>';
      $("nextBox").style.display = "none";
      cachedRows = [];
      nextMeal = null;
      if (countdownTimer) clearInterval(countdownTimer);
      return;
    }

    rows.forEach(r => {
      const hosts = (r.meal_hosts || [])
        .map(h => h.members?.full_name)
        .filter(Boolean);
      r._hostNames = hosts;
    });

    cachedRows = rows;
    setMessage("ok", "تم تحميل الجدول.");

    nextMeal = pickNextUpcoming(rows);
    showNextBanner(nextMeal);
    runCountdown();

    renderAll();
  }

  const initialMonth = getMonthParam();
  $("monthPick").value = initialMonth;
  $("monthBadge").textContent = monthLabel(initialMonth);
  loadMonth(initialMonth);
</script>

</body>
</html>
