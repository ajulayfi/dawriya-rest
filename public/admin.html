<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>لوحة الإدارة — دورية الاستراحة</title>

  <link rel="stylesheet" href="./assets/app.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ===== Admin Responsive Layout ===== */
    .adminShell{margin-top:14px}
    .adminGrid{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
    }
    @media (min-width: 980px){
      .adminGrid{
        grid-template-columns: 360px 1fr;
        align-items:start;
      }
      .adminRight{
        display:grid;
        grid-template-columns: 1fr;
        gap:12px;
      }
    }

    /* Tabs (mobile only – CSS in app.css already helps, but we enforce) */
    .tabsBar{margin-top:12px}
    @media (min-width: 721px){
      .tabsBar{display:none}
    }

    /* Sections */
    .adminSection{display:block}
    .adminSection.hidden{display:none}
    @media (min-width: 721px){
      .adminSection.hidden{display:block} /* show all on desktop */
    }

    /* Floating quick action (mobile) */
    .fab{
      position:fixed;
      inset-inline-end:16px;
      bottom:18px;
      z-index:1200;
      border-radius:999px;
      padding:12px 16px;
      box-shadow:0 14px 38px rgba(15,23,42,.18);
      display:none;
    }
    @media (max-width: 720px){
      .fab{display:inline-flex}
    }

    /* Meal form: better on mobile */
    .form-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
    }
    @media (max-width: 580px){
      .form-grid{grid-template-columns:1fr}
    }

    /* Editing banner */
    .form-editing-banner{
      background:rgba(99,102,241,.06);
      border:1.5px solid rgba(99,102,241,.25);
      border-radius:12px;
      padding:10px 14px;
      margin-bottom:12px;
      font-size:13px;
      color:#3730a3;
      font-weight:700;
      display:none;
      gap:8px;
      align-items:center;
    }
    .form-editing-banner.show{display:flex}
    .linkBtn{
      background:none;border:none;cursor:pointer;
      color:#3730a3;font-weight:900;font-size:13px;
      font-family:inherit;padding:0;
    }

    /* Members list */
    .member-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 14px;border-bottom:1px solid var(--line);gap:12px;
      transition:background .15s;
    }
    .member-row:last-child{border-bottom:none}
    .member-row:hover{background:#f8fafc}
    .member-name{font-weight:800;font-size:15px}
    .member-status{font-size:11px;font-weight:900;letter-spacing:.04em}
    .status-active{color:#16a34a}
    .status-inactive{color:var(--muted)}

    /* Hosts pills area */
    .hosts-wrap{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0}

    /* Save overlay */
    .saving-overlay{
      position:fixed;inset:0;background:rgba(255,255,255,.7);backdrop-filter:blur(4px);
      z-index:2000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;
    }
    .saving-overlay.show{display:flex}
    .save-spinner{
      width:44px;height:44px;border:3px solid #e5e7eb;border-top-color:#111827;
      border-radius:50%;animation:spin .7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ===== Month view: table on desktop, cards on mobile ===== */
    .monthDesktop{display:block}
    .monthMobile{display:none}
    @media (max-width: 720px){
      .monthDesktop{display:none}
      .monthMobile{display:block}
    }

    .mealRowCard{
      border:1.5px solid var(--line);
      border-radius:16px;
      padding:12px 12px;
      background:#fff;
      box-shadow:0 2px 10px rgba(15,23,42,.04);
      display:flex;
      flex-direction:column;
      gap:10px;
      cursor:pointer;
      transition:transform .12s, box-shadow .15s;
    }
    .mealRowCard:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(15,23,42,.10)}
    .mealRowTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }
    .mealRowTitle{font-weight:900}
    .mealRowMeta{color:var(--muted);font-size:12px;line-height:1.7}
    .mealRowHosts{font-size:13px;font-weight:800;line-height:1.7}
    .mealRowNote{font-size:12px;color:var(--muted);line-height:1.7}
    .mealRowTag{
      display:inline-flex;align-items:center;gap:6px;
      padding:6px 10px;border-radius:999px;border:1.5px solid var(--line);
      background:#fff;font-size:12px;font-weight:900;color:var(--muted);
      white-space:nowrap;
    }

    /* Toasts */
    .toast-area{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      z-index:2500;display:flex;flex-direction:column;gap:8px;align-items:center;
      pointer-events:none;
    }
    .toast{
      background:#111827;color:#fff;
      font-family:inherit;font-size:13px;font-weight:900;
      padding:11px 22px;border-radius:999px;
      box-shadow:0 8px 24px rgba(0,0,0,.2);
      animation:toastIn .25s ease both;
      white-space:nowrap;
    }
    .toast.ok{background:#166534;border:1.5px solid rgba(34,197,94,.3)}
    .toast.warn{background:#92400e;border:1.5px solid rgba(245,158,11,.3)}
    @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>

<body>
<div class="container">

  <div class="header">
    <div class="title">
      <h1 id="title">لوحة الإدارة</h1>
      <div class="sub">إدارة الأعضاء + جدولة شهرية + إشعار واتساب</div>
    </div>
    <div class="toolbar">
      <span id="who" class="badge">—</span>
      <a class="btn secondary" href="./schedule.html" target="_blank">👁 الجدول</a>
      <button id="logout" class="btn secondary">خروج</button>
    </div>
  </div>

  <div id="status" class="notice">جارٍ التحقق…</div>

  <!-- Mobile Tabs -->
  <div class="tabsBar" id="tabsBar">
    <button class="tabBtn active" data-tab="members">👥 الأعضاء</button>
    <button class="tabBtn" data-tab="meal">🍽️ المناسبة</button>
    <button class="tabBtn" data-tab="month">📅 جدول الشهر</button>
  </div>

  <div class="adminShell">
    <div class="adminGrid">

      <!-- LEFT: Members -->
      <section class="adminSection" id="sec-members">
        <div class="card">
          <div style="font-weight:900;font-size:15px;margin-bottom:4px">الأعضاء</div>
          <div class="small" style="margin-bottom:14px">أضف وفعّل وأوقف الأعضاء</div>

          <div style="display:flex;gap:10px;align-items:center">
            <input id="newMember" class="input" placeholder="اسم العضو الجديد" style="flex:1 1 180px"/>
            <button id="addMember" class="btn" style="white-space:nowrap">+ إضافة</button>
          </div>

          <div class="hr"></div>
          <div id="membersList" class="small" style="min-height:60px">—</div>
        </div>
      </section>

      <!-- RIGHT: Meal + Month -->
      <div class="adminRight">

        <!-- Meal editor -->
        <section class="adminSection hidden" id="sec-meal">
          <div class="card">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px">
              <div>
                <div style="font-weight:900;font-size:15px">إضافة / تعديل مناسبة</div>
                <div class="small">الوقت يدعم عبور منتصف الليل (مثال: 7:00م → 9:00ص)</div>
              </div>
              <span class="badge">📍 <b style="color:#111827" id="loc">—</b></span>
            </div>

            <div class="form-editing-banner" id="editingBanner">
              <span>✏️</span>
              <span id="editingLabel">وضع التعديل</span>
              <button class="linkBtn" id="cancelEditBtn" style="margin-right:auto">✕ إلغاء</button>
            </div>

            <div class="form-grid">
              <div>
                <label>النوع</label>
                <select id="mealType" class="input">
                  <option value="futoor">🌅 فطور</option>
                  <option value="ghada">☀️ غدا</option>
                  <option value="asha">🌙 عشا</option>
                  <option value="suhoor">⭐ سحور</option>
                </select>
              </div>
              <div>
                <label>التاريخ</label>
                <input id="date" class="input" type="date"/>
              </div>
              <div>
                <label>من</label>
                <input id="startTime" class="input" type="time" value="19:00"/>
              </div>
              <div>
                <label>إلى</label>
                <input id="endTime" class="input" type="time" value="00:00"/>
              </div>
            </div>

            <label>ملاحظات (اختياري)</label>
            <textarea id="notes" class="input" rows="2" placeholder="مثال: كل واحد يجيب شيء…"></textarea>

            <div class="hr"></div>

            <div style="font-weight:900;margin-bottom:10px;font-size:14px">الداعون</div>
            <div id="hostsPicker" class="small">—</div>

            <div class="hr"></div>

            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between">
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                <button id="saveMeal" class="btn">💾 حفظ</button>
                <button id="resetForm" class="btn secondary">تفريغ</button>
                <button id="deleteMeal" class="btn danger" style="display:none">🗑 حذف</button>
              </div>
              <button id="waPublish" class="btn secondary">📢 إشعار واتساب</button>
            </div>
          </div>
        </section>

        <!-- Month schedule -->
        <section class="adminSection hidden" id="sec-month">
          <div class="card">
            <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap">
              <div>
                <div style="font-weight:900;font-size:15px;margin-bottom:4px" id="tableMonthLabel">جدول الشهر</div>
                <div class="small">اضغط على عنصر للتعديل</div>
              </div>
              <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
                <input id="monthPick" class="input" type="month" style="width:160px"/>
                <button id="reloadMonth" class="btn secondary">تحديث</button>
              </div>
            </div>

            <div class="hr"></div>

            <div id="monthTableWrap">
              <div class="monthDesktop" style="overflow-x:auto">—</div>
              <div class="monthMobile" style="display:grid;gap:10px">—</div>
            </div>
          </div>
        </section>

      </div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast-area" id="toastArea"></div>

<!-- Saving overlay -->
<div class="saving-overlay" id="savingOverlay">
  <div class="save-spinner"></div>
  <div style="font-weight:900;color:#111827">جاري الحفظ…</div>
</div>

<!-- Mobile FAB -->
<button class="btn fab" id="fabAdd">+ مناسبة</button>

<script type="module">
  import { DEFAULT_LOCATION, APP_TITLE, TZ, ACCESS_TOKEN } from "./assets/config.js";
  import {
    supabase as sb,
    pad2,
    getMonthParam,
    monthLabel,
    mealLabel,
    formatTime12,
    formatGregorian,
    formatHijriUmmAlQura,
    computeEndISO
  } from "./assets/app.js";

  const $ = (id) => document.getElementById(id);

  $("title").textContent = `لوحة الإدارة — ${APP_TITLE}`;
  $("loc").textContent = DEFAULT_LOCATION;

  // ===== Toast =====
  function toast(msg, kind=""){
    const el = document.createElement("div");
    el.className = "toast " + kind;
    el.textContent = msg;
    $("toastArea").appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  function setStatus(kind, text){
    $("status").className = kind ? `notice ${kind}` : "notice";
    $("status").textContent = text;
  }

  // ===== Tabs (mobile) =====
  const tabsBar = $("tabsBar");
  function showTab(tab){
    // mobile behavior
    const isMobile = window.matchMedia("(max-width: 720px)").matches;
    if (!isMobile) return;

    tabsBar.querySelectorAll(".tabBtn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
    $("sec-members").classList.toggle("hidden", tab !== "members");
    $("sec-meal").classList.toggle("hidden", tab !== "meal");
    $("sec-month").classList.toggle("hidden", tab !== "month");
  }

  tabsBar.addEventListener("click", (e) => {
    const btn = e.target.closest(".tabBtn");
    if (!btn) return;
    showTab(btn.dataset.tab);
  });

  window.addEventListener("resize", () => {
    // when switching to desktop, show everything
    const isMobile = window.matchMedia("(max-width: 720px)").matches;
    if (!isMobile){
      $("sec-members").classList.remove("hidden");
      $("sec-meal").classList.remove("hidden");
      $("sec-month").classList.remove("hidden");
    } else {
      // keep current selected
      const active = tabsBar.querySelector(".tabBtn.active")?.dataset.tab || "members";
      showTab(active);
    }
  });

  $("fabAdd").addEventListener("click", () => {
    showTab("meal");
    resetForm();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  // ===== State =====
  let members = [];
  let editingMealId = null;
  let selectedHostIds = new Set();
  let mealsCache = []; // current month meals

  const MEAL_ICON = { futoor:"🌅", ghada:"☀️", asha:"🌙", suhoor:"⭐" };

  // ===== Auth =====
  async function requireAdmin(){
    const { data:{ user } } = await sb.auth.getUser();
    if (!user){ location.href = "./login.html"; return null; }

    $("who").textContent = user.email || user.id;

    const { data, error } = await sb.rpc("is_admin");
    if (error || !data){
      setStatus("warn","غير مصرح. تأكد أن بريدك ضمن قائمة الأدمن.");
      return null;
    }

    setStatus("ok","تم التحقق ✓ يمكنك التعديل.");
    return user;
  }

  // ===== Members =====
  async function loadMembers(){
    const { data, error } = await sb.from("members").select("id, full_name, is_active").order("full_name");
    if (error){ $("membersList").textContent = error.message; return; }
    members = data || [];
    renderMembers();
    renderHostsPicker();
  }

  function renderMembers(){
    if (!members.length){
      $("membersList").textContent = "لا يوجد أعضاء بعد.";
      return;
    }
    const wrap = document.createElement("div");
    members.forEach(m => {
      const row = document.createElement("div");
      row.className = "member-row";
      row.innerHTML = `
        <div>
          <div class="member-name">${m.full_name}</div>
          <div class="member-status ${m.is_active ? 'status-active' : 'status-inactive'}">${m.is_active ? '● نشط' : '○ موقوف'}</div>
        </div>
        <button class="btn secondary" style="font-size:13px;padding:8px 12px">${m.is_active ? "إيقاف" : "تفعيل"}</button>
      `;
      row.querySelector("button").onclick = async () => {
        const { error } = await sb.from("members").update({ is_active:!m.is_active }).eq("id", m.id);
        if (error){ toast(error.message, "warn"); return; }
        toast(m.is_active ? `تم إيقاف ${m.full_name}` : `تم تفعيل ${m.full_name}`, "ok");
        await loadMembers();
      };
      wrap.appendChild(row);
    });
    $("membersList").innerHTML = "";
    $("membersList").appendChild(wrap);
  }

  async function addMember(){
    const name = ($("newMember").value || "").trim();
    if (!name) return;
    const { error } = await sb.from("members").insert({ full_name:name, is_active:true });
    if (error){ toast(error.message, "warn"); return; }
    $("newMember").value = "";
    toast(`تم إضافة "${name}" ✓`, "ok");
    await loadMembers();
  }

  function renderHostsPicker(){
    const active = members.filter(m => !!m.is_active);
    if (!active.length){
      $("hostsPicker").textContent = "لا يوجد أعضاء مفعّلين.";
      return;
    }
    const wrap = document.createElement("div");
    wrap.className = "hosts-wrap";
    active.forEach(m => {
      const id = `host_${m.id}`;
      const label = document.createElement("label");
      label.className = "pill";
      label.setAttribute("for", id);
      label.style.cursor = "pointer";
      label.innerHTML = `<input type="checkbox" id="${id}" ${selectedHostIds.has(m.id) ? "checked" : ""}> <span>${m.full_name}</span>`;
      label.querySelector("input").onchange = (e) => {
        if (e.target.checked) selectedHostIds.add(m.id);
        else selectedHostIds.delete(m.id);
      };
      wrap.appendChild(label);
    });
    $("hostsPicker").innerHTML = "";
    $("hostsPicker").appendChild(wrap);
  }

  // ===== Form =====
  function showEditingBanner(label){
    $("editingBanner").classList.add("show");
    $("editingLabel").textContent = label;
    $("deleteMeal").style.display = "inline-flex";
  }

  function hideEditingBanner(){
    $("editingBanner").classList.remove("show");
    $("deleteMeal").style.display = "none";
  }

  function resetForm(){
    editingMealId = null;
    selectedHostIds = new Set();
    $("mealType").value = "asha";
    $("notes").value = "";
    hideEditingBanner();
    renderHostsPicker();
  }
  window.resetForm = resetForm;

  $("cancelEditBtn").addEventListener("click", () => {
    resetForm();
    toast("تم إلغاء التعديل");
  });

  async function saveMeal(){
    const d = $("date").value;
    if (!d){ toast("اختر التاريخ", "warn"); return; }

    const { startISO, endISO } = computeEndISO(d, $("startTime").value, $("endTime").value);

    if (selectedHostIds.size === 0){
      if (!confirm("لم يتم اختيار داعين. هل تريد الحفظ بدون داعين؟")) return;
    }

    const payload = {
      meal: $("mealType").value,
      starts_at: startISO,
      ends_at: endISO,
      notes: ($("notes").value || "").trim() || null
    };

    $("savingOverlay").classList.add("show");
    $("saveMeal").disabled = true;

    try{
      let mealId = editingMealId;

      if (editingMealId){
        const upd = await sb.from("meals").update(payload).eq("id", editingMealId);
        if (upd.error){ toast(upd.error.message, "warn"); return; }
      } else {
        const ins = await sb.from("meals").insert(payload).select("id").single();
        if (ins.error){ toast(ins.error.message, "warn"); return; }
        mealId = ins.data.id;
      }

      // hosts: replace
      const delRes = await sb.from("meal_hosts").delete().eq("meal_id", mealId);
      if (delRes.error){ toast("تعذر تحديث الداعين: " + delRes.error.message, "warn"); return; }

      if (selectedHostIds.size){
        const rows = [...selectedHostIds].map(member_id => ({ meal_id:mealId, member_id }));
        const insRes = await sb.from("meal_hosts").insert(rows);
        if (insRes.error){ toast("تعذر إضافة الداعين: " + insRes.error.message, "warn"); return; }
      }

      editingMealId = mealId;
      showEditingBanner(`تعديل: ${mealLabel(payload.meal)} — ${formatGregorian(payload.starts_at)}`);

      toast("تم الحفظ بنجاح ✓", "ok");
      setStatus("ok","تم الحفظ.");
      await loadMonthData(); // refresh month lists

      // mobile: jump to month tab for confirmation
      showTab("month");

    } finally {
      $("savingOverlay").classList.remove("show");
      $("saveMeal").disabled = false;
    }
  }

  async function deleteMeal(){
    if (!editingMealId) return;
    if (!confirm("تأكيد حذف هذه المناسبة؟ لا يمكن التراجع.")) return;

    const res = await sb.from("meals").delete().eq("id", editingMealId);
    if (res.error){ toast(res.error.message, "warn"); return; }

    toast("تم الحذف.", "ok");
    resetForm();
    await loadMonthData();
    showTab("month");
  }

  // ===== Month =====
  function buildMonthLink(month){
    const base = window.location.origin + window.location.pathname.replace("admin.html","schedule.html");
    return `${base}?month=${month}&access=${encodeURIComponent(ACCESS_TOKEN)}`;
  }

  async function loadMonthData(){
    const month = $("monthPick").value || getMonthParam();
    $("monthPick").value = month;
    $("tableMonthLabel").textContent = `جدول ${monthLabel(month)}`;
    $("waPublish").textContent = `📢 إشعار واتساب — ${monthLabel(month)}`;

    const start = `${month}-01T00:00:00+03:00`;
    const [yy, mm] = month.split("-").map(Number);
    const endDate = new Date(Date.UTC(yy, mm, 1));
    const end = `${endDate.getUTCFullYear()}-${pad2(endDate.getUTCMonth()+1)}-${pad2(endDate.getUTCDate())}T00:00:00+03:00`;

    const res = await sb.from("meals")
      .select("id, meal, starts_at, ends_at, notes, meal_hosts(member_id)")
      .gte("starts_at", start)
      .lt("starts_at", end)
      .order("starts_at", { ascending:true });

    if (res.error){
      $("monthTableWrap").querySelector(".monthDesktop").textContent = res.error.message;
      $("monthTableWrap").querySelector(".monthMobile").textContent = res.error.message;
      return;
    }

    mealsCache = res.data || [];
    renderMonthDesktopTable(mealsCache);
    renderMonthMobileCards(mealsCache);
  }

  function renderMonthDesktopTable(meals){
    const root = $("monthTableWrap").querySelector(".monthDesktop");

    if (!meals.length){
      root.innerHTML = `<div style="padding:30px;text-align:center;color:var(--muted)">📭 لا توجد مناسبات لهذا الشهر.</div>`;
      return;
    }

    const table = document.createElement("table");
    table.className = "table";
    table.innerHTML = `<thead><tr>
      <th>النوع</th><th>التاريخ</th><th>الوقت</th><th>الداعون</th><th>ملاحظات</th>
    </tr></thead>`;

    const tbody = document.createElement("tbody");

    meals.forEach(r => {
      const hostIds   = (r.meal_hosts || []).map(x => x.member_id);
      const hostNames = hostIds.map(id => members.find(m => m.id === id)?.full_name).filter(Boolean);

      const tr = document.createElement("tr");
      tr.className = `row-${r.meal}`;
      tr.style.cursor = "pointer";
      tr.innerHTML = `
        <td><b>${MEAL_ICON[r.meal] || "🍽️"} ${mealLabel(r.meal)}</b></td>
        <td>
          <div style="font-weight:800">${formatGregorian(r.starts_at)}</div>
          <div class="small">الموافق ${formatHijriUmmAlQura(r.starts_at)}</div>
        </td>
        <td style="white-space:nowrap">${formatTime12(r.starts_at)} – ${formatTime12(r.ends_at)}</td>
        <td>${hostNames.join(" – ") || "<span class='small'>—</span>"}</td>
        <td class="small">${r.notes || "—"}</td>
      `;

      tr.onclick = () => openMealForEdit(r);
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    root.innerHTML = "";
    root.appendChild(table);
  }

  function renderMonthMobileCards(meals){
    const root = $("monthTableWrap").querySelector(".monthMobile");

    if (!meals.length){
      root.innerHTML = `<div style="padding:22px;text-align:center;color:var(--muted)">📭 لا توجد مناسبات لهذا الشهر.</div>`;
      return;
    }

    root.innerHTML = "";
    meals.forEach(r => {
      const hostIds   = (r.meal_hosts || []).map(x => x.member_id);
      const hostNames = hostIds.map(id => members.find(m => m.id === id)?.full_name).filter(Boolean);

      const card = document.createElement("div");
      card.className = "mealRowCard";
      card.innerHTML = `
        <div class="mealRowTop">
          <div>
            <div class="mealRowTitle">${MEAL_ICON[r.meal] || "🍽️"} ${mealLabel(r.meal)}</div>
            <div class="mealRowMeta">
              <div>📅 <b style="color:#0f172a">${formatGregorian(r.starts_at)}</b></div>
              <div>🕌 الموافق ${formatHijriUmmAlQura(r.starts_at)}</div>
              <div>⏰ ${formatTime12(r.starts_at)} – ${formatTime12(r.ends_at)}</div>
            </div>
          </div>
          <span class="mealRowTag">✏️ تعديل</span>
        </div>

        <div class="mealRowHosts">👥 ${hostNames.join(" – ") || "—"}</div>
        <div class="mealRowNote">📝 ${r.notes || "—"}</div>
      `;

      card.onclick = () => openMealForEdit(r);
      root.appendChild(card);
    });
  }

  function openMealForEdit(r){
    editingMealId = r.id;
    $("deleteMeal").style.display = "inline-flex";

    const s = new Date(r.starts_at);
    const e = new Date(r.ends_at);

    $("mealType").value = r.meal;

    // date in TZ
    $("date").value = new Intl.DateTimeFormat("en-CA", {
      timeZone: TZ, year:"numeric", month:"2-digit", day:"2-digit"
    }).format(s);

    // time in TZ
    $("startTime").value = new Intl.DateTimeFormat("en-GB", {
      timeZone: TZ, hour:"2-digit", minute:"2-digit", hour12:false
    }).format(s);

    $("endTime").value = new Intl.DateTimeFormat("en-GB", {
      timeZone: TZ, hour:"2-digit", minute:"2-digit", hour12:false
    }).format(e);

    $("notes").value = r.notes || "";

    const hostIds = (r.meal_hosts || []).map(x => x.member_id);
    selectedHostIds = new Set(hostIds);
    renderHostsPicker();

    showEditingBanner(`تعديل: ${mealLabel(r.meal)} — ${formatGregorian(r.starts_at)}`);

    // mobile: go to meal tab
    showTab("meal");
    window.scrollTo({ top:0, behavior:"smooth" });
  }

  // ===== WhatsApp publish =====
  function publishWhatsApp(){
    const month = $("monthPick").value || getMonthParam();
    const link = buildMonthLink(month);
    const msg = `📅 جدول ${APP_TITLE}\n${monthLabel(month)}\n\nاضغط الرابط لعرض الجدول وإضافة مناسبتك للتقويم:\n${link}`;
    window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
  }

  // ===== Events =====
  $("logout").addEventListener("click", async () => {
    await sb.auth.signOut();
    location.href = "./login.html";
  });

  $("addMember").addEventListener("click", addMember);
  $("newMember").addEventListener("keydown", e => { if (e.key === "Enter") addMember(); });

  $("resetForm").addEventListener("click", resetForm);
  $("saveMeal").addEventListener("click", saveMeal);
  $("deleteMeal").addEventListener("click", deleteMeal);

  $("reloadMonth").addEventListener("click", loadMonthData);
  $("monthPick").addEventListener("change", loadMonthData);
  $("waPublish").addEventListener("click", publishWhatsApp);

  // ===== Init =====
  (async () => {
    const user = await requireAdmin();
    if (!user) return;

    // default date
    const today = new Date();
    $("date").value = `${today.getFullYear()}-${pad2(today.getMonth()+1)}-${pad2(today.getDate())}`;

    // month
    const month = getMonthParam();
    $("monthPick").value = month;

    await loadMembers();
    await loadMonthData();
    resetForm();

    // mobile: start at members tab
    showTab("members");
  })();
</script>
</body>
</html>
