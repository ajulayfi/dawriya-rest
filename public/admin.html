<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>لوحة الإدارة — دورية الاستراحة</title>

  <link rel="stylesheet" href="./assets/app.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ====== Table actions ====== */
    .rowActions{display:flex;gap:8px;align-items:center;justify-content:flex-start;flex-wrap:wrap}
    .iconBtn{
      border:1.5px solid var(--line);
      background:#fff;
      border-radius:12px;
      padding:8px 10px;
      font-family:inherit;
      font-weight:900;
      cursor:pointer;
      transition:.15s;
      display:inline-flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
      font-size:13px;
      color:var(--text);
    }
    .iconBtn:hover{background:#f8fafc;border-color:#94a3b8}
    .iconBtn.danger{border-color:rgba(185,28,28,.25);background:rgba(185,28,28,.06);color:#991b1b}
    .iconBtn.danger:hover{background:rgba(185,28,28,.09);border-color:rgba(185,28,28,.35)}
    .kTiny{font-size:12px;color:var(--muted);font-weight:800}

    /* ====== Drawer (Edit Panel) ====== */
    .drawerBackdrop{
      position:fixed;inset:0;
      background:rgba(2,6,23,.35);
      z-index:1000;
      display:none;
      animation:fadeIn .18s ease both;
    }
    .drawerBackdrop.show{display:block}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    .drawer{
      position:fixed;
      top:0; bottom:0;
      inset-inline-start:0; /* RTL: start = right visually */
      width:min(520px, 92vw);
      background:#fff;
      border-left:1px solid var(--line);
      box-shadow:0 22px 70px rgba(0,0,0,.25);
      z-index:1001;
      transform:translateX(110%);
      transition:transform .22s ease;
      display:flex;
      flex-direction:column;
    }
    .drawer.show{transform:translateX(0)}
    .drawerHeader{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .drawerTitle{font-weight:900}
    .drawerClose{
      border:1.5px solid var(--line);
      background:#fff;
      border-radius:12px;
      padding:8px 10px;
      cursor:pointer;
      font-weight:900;
    }
    .drawerClose:hover{background:#f8fafc;border-color:#94a3b8}
    .drawerBody{
      padding:14px 16px;
      overflow:auto;
      flex:1 1 auto;
    }
    .drawerFooter{
      padding:12px 16px;
      border-top:1px solid var(--line);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:space-between;
      align-items:center;
      background:rgba(244,246,251,.65);
      backdrop-filter:blur(10px);
    }

    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width:580px){.form-grid{grid-template-columns:1fr}}

    .hosts-wrap{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0}

    /* ====== Modal confirm ====== */
    .modal{
      position:fixed; inset:0;
      display:none;
      z-index:1200;
      place-items:center;
      padding:18px;
    }
    .modal.show{display:grid}
    .modalCard{
      width:min(520px, 92vw);
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 30px 90px rgba(0,0,0,.28);
      padding:16px;
      animation:pop .16s ease both;
    }
    @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    .modalActions{display:flex;gap:10px;justify-content:flex-start;flex-wrap:wrap;margin-top:12px}

    /* ====== Toasts (same as before) ====== */
    .toast-area{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      z-index:2000;display:flex;flex-direction:column;gap:8px;align-items:center;
      pointer-events:none;
    }
    .toast{
      background:#111827;color:#fff;
      font-family:inherit;font-size:13px;font-weight:900;
      padding:11px 22px;border-radius:999px;
      box-shadow:0 8px 24px rgba(0,0,0,.2);
      animation:toastIn .25s ease both;
      white-space:nowrap;
      pointer-events:none;
    }
    .toast.ok{background:#166534;border:1.5px solid rgba(34,197,94,.3)}
    .toast.warn{background:#92400e;border:1.5px solid rgba(245,158,11,.3)}
    @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .saving-overlay{
      position:fixed;inset:0;background:rgba(255,255,255,.7);backdrop-filter:blur(4px);
      z-index:1500;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;
      display:none;
    }
    .saving-overlay.show{display:flex}
    .save-spinner{
      width:44px;height:44px;border:3px solid #e5e7eb;border-top-color:#111827;
      border-radius:50%;animation:spin .7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>

<body>
<div class="container">

  <div class="header">
    <div class="title">
      <h1 id="title">لوحة الإدارة</h1>
      <div class="sub">إدارة الأعضاء + جدولة شهرية — تعديل وحذف بطريقة عملية</div>
    </div>
    <div class="toolbar">
      <span id="who" class="badge">—</span>
      <a class="btn secondary" href="./schedule.html" target="_blank">👁 عرض الجدول</a>
      <button id="newMealBtn" class="btn">+ مناسبة</button>
      <button id="logout" class="btn secondary">خروج</button>
    </div>
  </div>

  <div id="status" class="notice">جارٍ التحقق…</div>

  <!-- Members + Month table -->
  <div class="grid2" style="margin-top:14px">

    <!-- Members -->
    <div class="card">
      <div style="font-weight:900;font-size:15px;margin-bottom:4px">الأعضاء</div>
      <div class="small" style="margin-bottom:14px">أضف وفعّل وأوقف الأعضاء</div>

      <div style="display:flex;gap:10px;align-items:center">
        <input id="newMember" class="input" placeholder="اسم العضو الجديد" style="flex:1 1 180px"/>
        <button id="addMember" class="btn" style="white-space:nowrap">+ إضافة</button>
      </div>

      <div class="hr"></div>
      <div id="membersList" class="small" style="min-height:60px">—</div>
    </div>

    <!-- Month table -->
    <div class="card">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <div>
          <div style="font-weight:900;font-size:15px" id="tableMonthLabel">جدول الشهر</div>
          <div class="small">استخدم زر “تعديل” أو “حذف” داخل الصف</div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <input id="monthPick" class="input" type="month" style="width:160px"/>
          <button id="reloadMonth" class="btn secondary">تحديث</button>
        </div>
      </div>

      <div class="hr"></div>
      <div id="monthTableWrap" style="overflow-x:auto">—</div>
      <div class="small" style="margin-top:10px">
        📍 <b id="loc">—</b> <span class="kTiny">• أوقاتك محسوبة على توقيت الرياض</span>
      </div>
    </div>

  </div>

</div>

<!-- Drawer -->
<div class="drawerBackdrop" id="drawerBackdrop"></div>
<div class="drawer" id="drawer">
  <div class="drawerHeader">
    <div>
      <div class="drawerTitle" id="drawerTitle">—</div>
      <div class="small" id="drawerSub">—</div>
    </div>
    <button class="drawerClose" id="drawerClose">✕</button>
  </div>

  <div class="drawerBody">
    <div class="form-grid">
      <div>
        <label>النوع</label>
        <select id="mealType" class="input">
          <option value="futoor">🌅 فطور</option>
          <option value="ghada">☀️ غدا</option>
          <option value="asha">🌙 عشا</option>
          <option value="suhoor">⭐ سحور</option>
        </select>
      </div>

      <div>
        <label>التاريخ</label>
        <input id="date" class="input" type="date"/>
      </div>

      <div>
        <label>من</label>
        <input id="startTime" class="input" type="time" value="19:00"/>
      </div>

      <div>
        <label>إلى</label>
        <input id="endTime" class="input" type="time" value="00:00"/>
      </div>
    </div>

    <label>ملاحظات (اختياري)</label>
    <textarea id="notes" class="input" rows="2" placeholder="مثال: كل واحد يجيب شيء…"></textarea>

    <div class="hr"></div>

    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
      <div style="font-weight:900">الداعون</div>
      <div class="small">اختر من الأعضاء المفعّلين فقط</div>
    </div>

    <div id="hostsPicker" class="small" style="margin-top:10px">—</div>

    <div class="hr"></div>
    <div class="small" id="drawerHint">—</div>
  </div>

  <div class="drawerFooter">
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button id="saveMeal" class="btn">💾 حفظ</button>
      <button id="clearForm" class="btn secondary">تفريغ</button>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button id="deleteMeal" class="btn danger" style="display:none">🗑 حذف</button>
      <button id="waPublish" class="btn secondary">📢 واتساب</button>
    </div>
  </div>
</div>

<!-- Confirm modal -->
<div class="modal" id="confirmModal">
  <div class="modalCard">
    <div style="font-weight:900;font-size:15px" id="confirmTitle">تأكيد</div>
    <div class="small" style="margin-top:6px" id="confirmText">—</div>
    <div class="modalActions">
      <button class="btn danger" id="confirmYes">نعم، احذف</button>
      <button class="btn secondary" id="confirmNo">إلغاء</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-area" id="toastArea"></div>

<!-- Saving overlay -->
<div class="saving-overlay" id="savingOverlay">
  <div class="save-spinner"></div>
  <div style="font-weight:900;color:#111827">جاري الحفظ…</div>
</div>

<script type="module">
  import { SUPABASE_URL, SUPABASE_ANON_KEY, ACCESS_TOKEN, TZ, DEFAULT_LOCATION, APP_TITLE } from "./assets/config.js";
  import {
    computeEndISO,
    monthLabel,
    getMonthParam,
    formatGregorian,
    formatHijriUmmAlQura,
    formatTime12
  } from "./assets/app.js";

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const $ = (id) => document.getElementById(id);
  const pad2 = (n) => String(n).padStart(2,"0");

  $("title").textContent = `لوحة الإدارة — ${APP_TITLE}`;
  $("loc").textContent = DEFAULT_LOCATION;

  // Toast
  function toast(msg, kind=""){
    const el = document.createElement("div");
    el.className = "toast " + kind;
    el.textContent = msg;
    $("toastArea").appendChild(el);
    setTimeout(() => el.remove(), 2800);
  }

  function setStatus(kind, text){
    $("status").className = kind ? `notice ${kind}` : "notice";
    $("status").textContent = text;
  }

  // Drawer
  function openDrawer(){
    $("drawerBackdrop").classList.add("show");
    $("drawer").classList.add("show");
  }
  function closeDrawer(){
    $("drawerBackdrop").classList.remove("show");
    $("drawer").classList.remove("show");
  }

  $("drawerBackdrop").addEventListener("click", closeDrawer);
  $("drawerClose").addEventListener("click", closeDrawer);

  // Confirm modal
  function confirmDelete({ title, text }){
    return new Promise((resolve) => {
      $("confirmTitle").textContent = title || "تأكيد";
      $("confirmText").textContent = text || "هل أنت متأكد؟";
      $("confirmModal").classList.add("show");

      const yes = () => { cleanup(); resolve(true); };
      const no  = () => { cleanup(); resolve(false); };

      function cleanup(){
        $("confirmModal").classList.remove("show");
        $("confirmYes").removeEventListener("click", yes);
        $("confirmNo").removeEventListener("click", no);
      }

      $("confirmYes").addEventListener("click", yes);
      $("confirmNo").addEventListener("click", no);
    });
  }

  // State
  let members = [];
  let selectedHostIds = new Set();
  let editingMealId = null;

  // Auth
  async function requireAdmin(){
    const { data:{ user } } = await sb.auth.getUser();
    if (!user){ location.href = "./login.html"; return null; }
    $("who").textContent = user.email || user.id;

    const { data, error } = await sb.rpc("is_admin");
    if (error || !data){
      setStatus("warn","غير مصرح. تأكد أن بريدك ضمن قائمة الأدمن.");
      return null;
    }
    setStatus("ok","تم التحقق ✓ يمكنك التعديل.");
    return user;
  }

  // Members
  async function loadMembers(){
    const { data, error } = await sb.from("members").select("id, full_name, is_active").order("full_name");
    if (error){ $("membersList").textContent = error.message; return; }
    members = data || [];
    renderMembers();
    renderHostsPicker();
  }

  function renderMembers(){
    if (!members.length){
      $("membersList").textContent = "لا يوجد أعضاء بعد.";
      return;
    }
    const wrap = document.createElement("div");
    members.forEach(m => {
      const row = document.createElement("div");
      row.className = "member-row";
      row.style.cssText = "display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--line);gap:12px;";
      row.innerHTML = `
        <div>
          <div style="font-weight:900">${m.full_name}</div>
          <div class="small" style="font-weight:800;color:${m.is_active ? '#166534' : 'var(--muted)'}">
            ${m.is_active ? "● نشط" : "○ موقوف"}
          </div>
        </div>
        <button class="btn secondary" style="font-size:13px;padding:8px 12px">${m.is_active ? "إيقاف" : "تفعيل"}</button>
      `;
      row.querySelector("button").onclick = async () => {
        const { error } = await sb.from("members").update({ is_active: !m.is_active }).eq("id", m.id);
        if (error){ toast(error.message, "warn"); return; }
        toast(m.is_active ? `تم إيقاف ${m.full_name}` : `تم تفعيل ${m.full_name}`, "ok");
        await loadMembers();
        await loadMonthTable(); // refresh names visibility
      };
      wrap.appendChild(row);
    });
    $("membersList").innerHTML = "";
    $("membersList").appendChild(wrap);
  }

  function renderHostsPicker(){
    const active = members.filter(m => !!m.is_active);
    if (!active.length){
      $("hostsPicker").textContent = "لا يوجد أعضاء مفعّلين.";
      return;
    }
    const wrap = document.createElement("div");
    wrap.className = "hosts-wrap";
    active.forEach(m => {
      const id = `host_${m.id}`;
      const label = document.createElement("label");
      label.className = "pill";
      label.setAttribute("for", id);
      label.innerHTML = `<input type="checkbox" id="${id}"> <span>${m.full_name}</span>`;
      const input = label.querySelector("input");
      input.checked = selectedHostIds.has(m.id);
      input.onchange = (e) => {
        if (e.target.checked) selectedHostIds.add(m.id);
        else selectedHostIds.delete(m.id);
      };
      wrap.appendChild(label);
    });
    $("hostsPicker").innerHTML = "";
    $("hostsPicker").appendChild(wrap);
  }

  async function addMember(){
    const name = ($("newMember").value || "").trim();
    if (!name) return;
    const { error } = await sb.from("members").insert({ full_name:name, is_active:true });
    if (error){ toast(error.message, "warn"); return; }
    $("newMember").value = "";
    toast(`تم إضافة "${name}" ✓`, "ok");
    await loadMembers();
  }

  // Form helpers
  function resetForm({ keepDrawerOpen=true } = {}){
    editingMealId = null;
    selectedHostIds = new Set();
    $("mealType").value = "asha";
    $("notes").value = "";
    $("deleteMeal").style.display = "none";

    const today = new Date();
    $("date").value = `${today.getFullYear()}-${pad2(today.getMonth()+1)}-${pad2(today.getDate())}`;
    $("startTime").value = "19:00";
    $("endTime").value = "00:00";

    $("drawerTitle").textContent = "إضافة مناسبة جديدة";
    $("drawerSub").textContent = "املأ البيانات ثم اضغط حفظ";
    $("drawerHint").textContent = "💡 نصيحة: وقت النهاية إذا كان أقل من البداية سيتم اعتباره اليوم التالي تلقائيًا.";

    renderHostsPicker();
    $("waPublish").textContent = "📢 واتساب";
    if (keepDrawerOpen) openDrawer();
  }

  function fillFormFromMeal(row){
    editingMealId = row.id;

    $("mealType").value = row.meal;
    $("notes").value = row.notes || "";
    $("deleteMeal").style.display = "inline-flex";

    // set date/time from ISO with TZ
    const s = new Date(row.starts_at);
    const e = new Date(row.ends_at);

    $("date").value = new Intl.DateTimeFormat("en-CA", { timeZone:TZ, year:"numeric", month:"2-digit", day:"2-digit" }).format(s);
    $("startTime").value = new Intl.DateTimeFormat("en-GB", { timeZone:TZ, hour:"2-digit", minute:"2-digit", hour12:false }).format(s);
    $("endTime").value   = new Intl.DateTimeFormat("en-GB", { timeZone:TZ, hour:"2-digit", minute:"2-digit", hour12:false }).format(e);

    const hostIds = (row.meal_hosts || []).map(x => x.member_id);
    selectedHostIds = new Set(hostIds);
    renderHostsPicker();

    $("drawerTitle").textContent = "تعديل مناسبة";
    $("drawerSub").textContent = `${formatGregorian(row.starts_at)} — ${formatTime12(row.starts_at)} إلى ${formatTime12(row.ends_at)}`;
    $("drawerHint").textContent = "✏️ عدّل البيانات ثم اضغط حفظ. يمكنك الحذف من زر الحذف.";
    openDrawer();
  }

  // Save / Delete
  async function saveMeal(){
    const d = $("date").value;
    if (!d){ toast("اختر التاريخ", "warn"); return; }

    const { startISO, endISO } = computeEndISO(d, $("startTime").value, $("endTime").value);

    const payload = {
      meal: $("mealType").value,
      starts_at: startISO,
      ends_at: endISO,
      notes: ($("notes").value || "").trim() || null
    };

    $("savingOverlay").classList.add("show");
    $("saveMeal").disabled = true;

    try{
      let mealId = editingMealId;

      if (editingMealId){
        const upd = await sb.from("meals").update(payload).eq("id", editingMealId);
        if (upd.error){ toast(upd.error.message, "warn"); return; }
      } else {
        const ins = await sb.from("meals").insert(payload).select("id").single();
        if (ins.error){ toast(ins.error.message, "warn"); return; }
        mealId = ins.data.id;
      }

      // Update hosts
      const delRes = await sb.from("meal_hosts").delete().eq("meal_id", mealId);
      if (delRes.error){ toast("تعذر تحديث الداعين: " + delRes.error.message, "warn"); return; }

      if (selectedHostIds.size){
        const rows = [...selectedHostIds].map(member_id => ({ meal_id:mealId, member_id }));
        const insRes = await sb.from("meal_hosts").insert(rows);
        if (insRes.error){ toast("تعذر إضافة الداعين: " + insRes.error.message, "warn"); return; }
      }

      editingMealId = mealId;
      $("deleteMeal").style.display = "inline-flex";
      toast("تم الحفظ ✓", "ok");
      setStatus("ok","تم الحفظ.");
      await loadMonthTable();

    } finally {
      $("savingOverlay").classList.remove("show");
      $("saveMeal").disabled = false;
    }
  }

  async function deleteMeal(){
    if (!editingMealId) return;

    const ok = await confirmDelete({
      title: "تأكيد الحذف",
      text: "سيتم حذف المناسبة والداعين المرتبطين بها. لا يمكن التراجع."
    });
    if (!ok) return;

    $("savingOverlay").classList.add("show");
    try{
      const res = await sb.from("meals").delete().eq("id", editingMealId);
      if (res.error){ toast(res.error.message, "warn"); return; }
      toast("تم الحذف.", "ok");
      closeDrawer();
      resetForm({ keepDrawerOpen:false });
      await loadMonthTable();
    } finally {
      $("savingOverlay").classList.remove("show");
    }
  }

  // Month table
  async function loadMonthTable(){
    const month = $("monthPick").value || getMonthParam();
    $("monthPick").value = month;
    $("tableMonthLabel").textContent = `جدول ${monthLabel(month)}`;
    $("waPublish").textContent = `📢 واتساب — ${monthLabel(month)}`;

    const start = `${month}-01T00:00:00+03:00`;
    const [yy, mm] = month.split("-").map(Number);
    const endDate = new Date(Date.UTC(yy, mm, 1));
    const end = `${endDate.getUTCFullYear()}-${pad2(endDate.getUTCMonth()+1)}-${pad2(endDate.getUTCDate())}T00:00:00+03:00`;

    $("monthTableWrap").innerHTML = `
      <div style="padding:16px">
        <div class="skeleton" style="height:14px;border-radius:10px;margin-top:10px"></div>
        <div class="skeleton" style="height:14px;border-radius:10px;margin-top:10px;width:80%"></div>
        <div class="skeleton" style="height:14px;border-radius:10px;margin-top:10px;width:65%"></div>
      </div>
    `;

    const res = await sb.from("meals")
      .select("id, meal, starts_at, ends_at, notes, meal_hosts(member_id)")
      .gte("starts_at", start)
      .lt("starts_at", end)
      .order("starts_at", { ascending:true });

    if (res.error){ $("monthTableWrap").textContent = res.error.message; return; }

    const meals = res.data || [];
    if (!meals.length){
      $("monthTableWrap").innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted)">📭 لا توجد مناسبات لهذا الشهر.</div>`;
      return;
    }

    const table = document.createElement("table");
    table.className = "table";
    table.innerHTML = `<thead><tr>
      <th>النوع</th><th>التاريخ</th><th>الوقت</th><th>الداعون</th><th>إجراءات</th>
    </tr></thead>`;

    const tbody = document.createElement("tbody");

    meals.forEach(r => {
      const hostIds = (r.meal_hosts || []).map(x => x.member_id);
      const hostNames = hostIds
        .map(id => members.find(m => m.id === id)?.full_name)
        .filter(Boolean);

      const tr = document.createElement("tr");
      tr.className = `row-${r.meal}`;

      tr.innerHTML = `
        <td><b>${r.meal}</b></td>
        <td>
          <div style="font-weight:900">${formatGregorian(r.starts_at)}</div>
          <div class="small">${formatHijriUmmAlQura(r.starts_at)}</div>
        </td>
        <td style="white-space:nowrap">
          ${formatTime12(r.starts_at)} – ${formatTime12(r.ends_at)}
        </td>
        <td>${hostNames.join(" – ") || "<span class='small'>—</span>"}</td>
        <td>
          <div class="rowActions">
            <button class="iconBtn" data-act="edit">✏️ تعديل</button>
            <button class="iconBtn danger" data-act="del">🗑 حذف</button>
          </div>
        </td>
      `;

      // Actions
      tr.querySelector('[data-act="edit"]').onclick = () => fillFormFromMeal(r);

      tr.querySelector('[data-act="del"]').onclick = async () => {
        editingMealId = r.id;
        const ok = await confirmDelete({
          title: "تأكيد الحذف",
          text: `حذف ${formatGregorian(r.starts_at)} (${r.meal}) ؟`
        });
        if (!ok) return;

        $("savingOverlay").classList.add("show");
        try{
          const resD = await sb.from("meals").delete().eq("id", r.id);
          if (resD.error){ toast(resD.error.message, "warn"); return; }
          toast("تم الحذف.", "ok");
          await loadMonthTable();
          // إذا كانت اللوحة مفتوحة لنفس المناسبة أقفلها
          if (editingMealId === r.id) closeDrawer();
        } finally {
          $("savingOverlay").classList.remove("show");
        }
      };

      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    $("monthTableWrap").innerHTML = "";
    $("monthTableWrap").appendChild(table);
  }

  function buildMonthLink(month){
    const base = window.location.origin + window.location.pathname.replace("admin.html","schedule.html");
    return `${base}?month=${month}&access=${encodeURIComponent(ACCESS_TOKEN)}`;
  }

  function publishWhatsApp(){
    const month = $("monthPick").value || getMonthParam();
    const link = buildMonthLink(month);
    const msg = `📅 جدول ${APP_TITLE}\n${monthLabel(month)}\n\nاضغط الرابط لعرض الجدول وإضافة مناسبتك للتقويم:\n${link}`;
    window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
  }

  // Events
  $("logout").addEventListener("click", async () => {
    await sb.auth.signOut();
    location.href = "./login.html";
  });

  $("addMember").addEventListener("click", addMember);
  $("newMember").addEventListener("keydown", e => { if (e.key === "Enter") addMember(); });

  $("reloadMonth").addEventListener("click", loadMonthTable);
  $("monthPick").addEventListener("change", loadMonthTable);

  $("newMealBtn").addEventListener("click", () => resetForm({ keepDrawerOpen:true }));
  $("clearForm").addEventListener("click", () => resetForm({ keepDrawerOpen:true }));
  $("saveMeal").addEventListener("click", saveMeal);
  $("deleteMeal").addEventListener("click", deleteMeal);
  $("waPublish").addEventListener("click", publishWhatsApp);

  // Init
  (async () => {
    const user = await requireAdmin();
    if (!user) return;

    const month = getMonthParam();
    $("monthPick").value = month;

    await loadMembers();
    await loadMonthTable();

    // جاهز: افتح الدروير فقط عند الضغط على + مناسبة
    resetForm({ keepDrawerOpen:false });
  })();
</script>
</body>
</html>
